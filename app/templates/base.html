<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title or "Face Recognition App" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f7f6f3;
        --card: #fffdf7;
        --ink: #132026;
        --muted: #50626b;
        --brand: #1d6b61;
        --accent: #f08a24;
        --danger: #b23a2f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 20% 20%, #d5ece2, transparent 40%),
          radial-gradient(circle at 80% 0%, #f8d9bc, transparent 35%),
          var(--bg);
      }
      .shell {
        width: min(1120px, 95vw);
        margin: 1.5rem auto 3rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 1rem;
      }
      .card {
        background: var(--card);
        border: 1px solid #e0ddd4;
        border-radius: 18px;
        padding: 1rem;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.04);
      }
      h1, h2, h3 { margin-top: 0; }
      input, select, button, textarea {
        font: inherit;
        border-radius: 10px;
        border: 1px solid #c8ccc3;
        padding: 0.6rem 0.7rem;
      }
      button {
        background: var(--brand);
        color: white;
        border: none;
        cursor: pointer;
      }
      button.warn { background: var(--danger); }
      button.alt { background: var(--accent); color: #132026; }
      .row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
      .muted { color: var(--muted); font-size: 0.92rem; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.85rem; }
      video, canvas {
        width: 100%;
        border-radius: 12px;
        background: #111;
      }
      .status-pill {
        display: inline-block;
        border-radius: 999px;
        padding: 0.2rem 0.6rem;
        font-size: 0.8rem;
        background: #e9f4f2;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.92rem;
      }
      th, td {
        border-bottom: 1px solid #e9e4d8;
        text-align: left;
        padding: 0.45rem 0.3rem;
      }
      @media (max-width: 900px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="shell">{% block content %}{% endblock %}</main>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
