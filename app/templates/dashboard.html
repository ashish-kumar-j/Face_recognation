{% extends "base.html" %}
{% block content %}
<div class="row" style="justify-content: space-between; margin-bottom: 1rem;">
  <div>
    <h1 style="margin-bottom: 0.3rem;">Recognition Dashboard</h1>
    <div class="muted">{{ email }} · role: <span class="status-pill">{{ role }}</span></div>
  </div>
  <button id="logout-btn" class="warn">Logout</button>
</div>

<div class="grid">
  <section class="card" style="grid-column: span 5;">
    <h2>Live Camera</h2>
    <video id="live-video" autoplay playsinline muted></video>
    <canvas id="capture-canvas" style="display:none"></canvas>
    <div class="row" style="margin-top: 0.6rem;">
      <button id="start-live">Start Recognition</button>
      <button id="stop-live" class="alt">Stop</button>
    </div>
    <p id="live-result" class="mono muted">Waiting to start...</p>
  </section>

  <section class="card" style="grid-column: span 7;">
    <h2>Known Persons</h2>
    <div class="row">
      <input id="person-name" placeholder="Display name" />
      <input id="person-external" placeholder="External id (optional)" />
      <button id="add-person">Add</button>
    </div>
    <div class="row" style="margin-top: 0.7rem;">
      <select id="person-select"></select>
      <button id="enroll-camera" class="alt">Enroll From Camera</button>
      <input id="upload-file" type="file" accept="image/*" />
      <button id="enroll-upload">Enroll Upload</button>
      <button id="deactivate-person" class="warn">Deactivate</button>
    </div>
    <p id="person-msg" class="muted"></p>
  </section>

  <section class="card" style="grid-column: span 6;">
    <h2>Events</h2>
    <button id="refresh-events" class="alt">Refresh</button>
    <div style="max-height: 320px; overflow:auto; margin-top: 0.6rem;">
      <table>
        <thead><tr><th>ID</th><th>Status</th><th>Score</th><th>Person</th><th>Time</th></tr></thead>
        <tbody id="events-body"></tbody>
      </table>
    </div>
  </section>

  <section class="card" style="grid-column: span 6;">
    <h2>Webhook + Settings</h2>
    <div class="row" style="flex-direction: column; align-items: stretch;">
      <input id="webhook-url" placeholder="Webhook URL" />
      <input id="webhook-secret" placeholder="Webhook secret" />
      <input id="threshold" type="number" min="0" max="1" step="0.01" placeholder="Strict threshold (0-1)" />
      <label><input id="store-unknown" type="checkbox" /> Store unknown snapshots</label>
      <button id="save-settings">Save</button>
    </div>
    <p id="settings-msg" class="muted"></p>
    <h3 style="margin-top: 1rem;">Outbox</h3>
    <button id="refresh-outbox" class="alt">Refresh Outbox</button>
    <div style="max-height: 220px; overflow:auto; margin-top: 0.6rem;">
      <table>
        <thead><tr><th>ID</th><th>Status</th><th>Retries</th><th>Action</th></tr></thead>
        <tbody id="outbox-body"></tbody>
      </table>
    </div>
  </section>
</div>
{% endblock %}
{% block scripts %}
<script>
  window.FaceApp?.initDashboard();
</script>
{% endblock %}
